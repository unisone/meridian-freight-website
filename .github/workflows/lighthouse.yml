name: Lighthouse CI

on:
  # Run on PRs after Vercel preview deploys
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      # Wait for Vercel preview deployment to be ready
      - name: Wait for Vercel deployment
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10

      # Run Lighthouse on key pages
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        with:
          urls: |
            ${{ steps.vercel.outputs.url }}/
            ${{ steps.vercel.outputs.url }}/services
            ${{ steps.vercel.outputs.url }}/contact
            ${{ steps.vercel.outputs.url }}/pricing/calculator
            ${{ steps.vercel.outputs.url }}/schedule
          uploadArtifacts: true
          budgetPath: .github/lighthouse-budget.json

      # Post results as PR comment
      - name: Post results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const results = ${{ steps.lhci.outputs.manifest }};
            const links = ${{ steps.lhci.outputs.links }};

            if (!results || !Array.isArray(results)) {
              console.log('No Lighthouse results to post');
              return;
            }

            let body = '## Lighthouse Performance Report\n\n';
            body += '| Page | Performance | Accessibility | SEO | Best Practices |\n';
            body += '|------|:-----------:|:-------------:|:---:|:--------------:|\n';

            for (const result of results) {
              const url = new URL(result.url);
              const path = url.pathname || '/';
              const perf = Math.round(result.summary.performance * 100);
              const a11y = Math.round(result.summary.accessibility * 100);
              const seo = Math.round(result.summary.seo * 100);
              const bp = Math.round(result.summary['best-practices'] * 100);

              const emoji = (score) => score >= 90 ? '🟢' : score >= 50 ? '🟡' : '🔴';

              body += `| \`${path}\` | ${emoji(perf)} ${perf} | ${emoji(a11y)} ${a11y} | ${emoji(seo)} ${seo} | ${emoji(bp)} ${bp} |\n`;
            }

            body += '\n';

            if (links) {
              const linkEntries = Object.entries(links);
              if (linkEntries.length > 0) {
                body += '<details><summary>Full reports</summary>\n\n';
                for (const [url, link] of linkEntries) {
                  const path = new URL(url).pathname || '/';
                  body += `- [\`${path}\`](${link})\n`;
                }
                body += '\n</details>\n';
              }
            }

            body += '\n*Budgets: Performance ≥ 90, Accessibility ≥ 95, SEO ≥ 95, Best Practices ≥ 90*';

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Lighthouse Performance Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
