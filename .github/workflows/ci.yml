name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Sentry source map upload is skipped in CI (no auth token)
          # All NEXT_PUBLIC_* analytics vars are intentionally absent —
          # the app handles missing env vars gracefully
          NEXT_TELEMETRY_DISABLED: 1

      - name: Test
        run: npm test

      # Build output summary — visible in GitHub Actions job summary
      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Bundle size (top-level .next output)
          if [ -d ".next" ]; then
            TOTAL_SIZE=$(du -sh .next | cut -f1)
            STATIC_SIZE=$(du -sh .next/static 2>/dev/null | cut -f1 || echo "n/a")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total build output | $TOTAL_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Static assets | $STATIC_SIZE |" >> $GITHUB_STEP_SUMMARY

            # JS bundle breakdown
            if [ -d ".next/static/chunks" ]; then
              JS_SIZE=$(du -sh .next/static/chunks | cut -f1)
              JS_COUNT=$(find .next/static/chunks -name '*.js' | wc -l | tr -d ' ')
              echo "| JS chunks | $JS_SIZE ($JS_COUNT files) |" >> $GITHUB_STEP_SUMMARY
            fi

            # Page count
            if [ -d ".next/server/app" ]; then
              PAGE_COUNT=$(find .next/server/app -name '*.html' -o -name '*.rsc' | wc -l | tr -d ' ')
              echo "| Prerendered pages | $PAGE_COUNT |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by CI on $(date -u +%Y-%m-%d)*" >> $GITHUB_STEP_SUMMARY
