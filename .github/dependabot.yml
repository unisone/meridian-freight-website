version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    # Group minor + patch updates into a single PR to reduce noise
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    # Conventional commits format
    commit-message:
      prefix: "chore(deps)"
      include: scope
    # Ignore transitive/bundled deps that Next.js or other tools manage
    ignore:
      - dependency-name: "webpack"
      - dependency-name: "webpack-*"
      - dependency-name: "react-router"
      - dependency-name: "react-router-dom"
      - dependency-name: "@remix-run/*"
      - dependency-name: "express"
      - dependency-name: "qs"
      - dependency-name: "lodash"
      - dependency-name: "lodash-es"
      - dependency-name: "node-forge"
      - dependency-name: "jsonpath"
      - dependency-name: "js-yaml"
      - dependency-name: "vite"
        # vite is a transitive dep of vitest — vitest manages its own version
    # Limit open PRs to avoid flooding
    open-pull-requests-limit: 5
    # Auto-assign for visibility
    reviewers:
      - unisone

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    open-pull-requests-limit: 3
